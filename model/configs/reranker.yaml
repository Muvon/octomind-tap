base_model: jinaai/jina-reranker-v1-turbo-en
output_dir: checkpoints
run_name: rerank-jina-turbo-v1

train:
  epochs: 3
  batch_size: 32
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 128
  seed: 42

data:
  triplets_path: data/triplets.jsonl

eval:
  top_k: [1, 3, 5]
  rerank_top_n: 5
