base_model: BAAI/bge-reranker-base
output_dir: checkpoints
run_name: rerank-bge-base-v1

# Original training mode — no classifier head reset. The MS-MARCO MiniLM
# head-reset variant lives in `scripts/train_reranker.py::_reset_classifier_head`
# and is enabled by setting this flag to true; leave off by default.
reset_classifier_head: false

train:
  epochs: 2
  # Effective in-batch-negatives count. CachedMNRL's GradCache lets us
  # push this well above what fits in VRAM in a single forward pass —
  # bigger batches = more competing negatives per anchor = sharper top-1
  # vs top-2 separation, which is exactly the runtime margin metric.
  batch_size: 128
  # Real per-step GPU/CPU memory load for the cached pass. Tune for your
  # device: 32 fits on most single GPUs, drop to 16 on CPU. Independent
  # of `batch_size` — the cache trick shrinks per-step VRAM only.
  mini_batch_size: 32
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 128
  seed: 42
  evaluation_steps: 0
  save_best_model: true
  use_amp: true

loss:
  # CachedMultipleNegativesRankingLoss: same contrastive ranking objective
  # as the original MNRL but with the GradCache trick so we can train at
  # effective batch_size=128+ on a single GPU. Drop to false for a
  # diagnostic run on the plain MNRL.
  cached: true
  # How many of the highest-scoring in-batch (and explicit hard-neg)
  # candidates to USE as negatives in the loss. Default 4 mirrors the
  # `CachedMultipleNegativesRankingLoss` library default and is also the
  # value used in BGE-reranker's training recipe.
  num_negatives: 4

data:
  triplets_path: data/triplets.jsonl

eval:
  top_k: [1, 3, 5]
  rerank_top_n: 5
