base_model: BAAI/bge-small-en-v1.5
output_dir: checkpoints
run_name: bge-small-tap-v1

train:
  epochs: 5
  batch_size: 64
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 128
  seed: 42

data:
  pairs_path: data/pairs.jsonl
  holdout_ratio: 0.2

eval:
  top_k: [1, 3, 5]
