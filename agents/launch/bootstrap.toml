### Product Hunt Launch Plan

```markdown
# Product Hunt Launch Plan: [Product Name]

## Pre-Launch (2-4 weeks before)

### Assets to Prepare
- [ ] **Tagline**: [60 chars max, benefit-focused]
- [ ] **Description**: [260 chars, what + for whom + why]
- [ ] **Gallery images**: [5-6 images showing the product in action]
- [ ] **Maker comment**: [First comment draft — story, why you built it, what's next]
- [ ] **Video/GIF**: [Optional but high-impact — 1-2 min demo]

### Community Prep
- [ ] Engage on PH for 2+ weeks before launch (upvote, comment genuinely)
- [ ] Build a list of 50+ supporters to notify on launch day
- [ ] Connect with a hunter (optional — self-hunting works fine now)
- [ ] Prepare personal outreach messages (NOT "please upvote")

### Timing
- **Best day**: Tuesday-Thursday
- **Launch time**: 12:01 AM PT (start of PH day)
- **Avoid**: Fridays, weekends, holidays, days with major tech events

## Launch Day

### Hour 0 (12:01 AM PT)
- [ ] Submit the product
- [ ] Post maker comment immediately
- [ ] Share on personal social media

### Hours 1-4
- [ ] Send personal messages to supporter list: "I launched [X] today — would love your honest feedback"
- [ ] NOT: "Please upvote" — this triggers PH's anti-gaming detection
- [ ] Respond to EVERY comment within 30 minutes

### Hours 4-12
- [ ] Share on Twitter/X with a thread about the building journey
- [ ] Post in relevant Slack/Discord communities (where you're already a member)
- [ ] Cross-post to Hacker News (Show HN) if appropriate

### Hours 12-24
- [ ] Continue responding to all comments
- [ ] Share progress updates on social media
- [ ] Thank supporters personally

## Post-Launch
- [ ] Write a "lessons learned" blog post (great for SEO + credibility)
- [ ] Follow up with everyone who commented — potential early users
- [ ] Add "Featured on Product Hunt" badge to site
```

### Cold Outreach Templates

```markdown
# Cold Outreach Templates: [Product Name]

## Template 1: The Value-First DM
Subject: [Specific observation about their work]

Hey [Name],

[One sentence showing you know their work — specific, not generic.]

I built [Product] because [problem you solve]. Thought it might help with [specific thing they're doing].

[One sentence about what makes it different.]

Happy to give you [free access / extended trial / lifetime deal] if you want to try it.

[Your name]

## Template 2: The Community Introduction
[For posting in Slack/Discord/forums where you're already active]

Hey everyone — I've been [lurking/contributing] here for [time] and finally shipped something I think this community would find useful.

**[Product Name]**: [One sentence — what it does]

Built it because [personal story / pain point]. It's [free / has a free tier / open source].

Would love feedback from this group — you're exactly who I built it for.

[Link]

## Template 3: The Influencer Pitch
Subject: Quick question about [their content topic]

Hi [Name],

Love your [specific content piece — be genuine]. Especially [specific detail].

I built [Product] which [one sentence]. Given your audience of [their audience], thought you might find it interesting to [review / mention / try].

Not asking for promotion — genuinely think your take on [specific angle] would be valuable.

Happy to give you [offer].

[Your name]

## Follow-Up Sequence
- **Day 3**: Reply to original — "Just bumping this in case it got buried. No worries if not a fit."
- **Day 7**: New angle — share a result/testimonial/update. "Quick update — [social proof]."
- **Day 14**: Final — "Last note from me on this. [Product] now does [new thing]. Here if you ever want to try it."
- **After 3 touches**: Stop. Move on. Never be annoying.
```

