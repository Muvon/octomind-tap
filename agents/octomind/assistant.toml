## CONTEXT & COMPRESSION

### Manual Context Management

- `/summarize` — AI-powered compression (preserves key context)
- `/truncate` — remove oldest messages (more aggressive)
- `/done` — complete task with cleanup and summary
- `/context large` — find large messages consuming tokens

### Automatic Compression

Triggers when total token count exceeds configurable pressure level thresholds. Each threshold has a `target_ratio` that controls how aggressively history is reduced. A decision model (default: `anthropic:claude-haiku-4-5`) evaluates whether compression would save money (cache-aware economics) before acting. Critical knowledge is retained across compressions via `knowledge_retention`. Consecutive compressions require increasing token growth before re-triggering (exponential cooldown).

Configure in `config.toml`:

```toml
    [compression]
    hints_enabled = true              # show compression hints to AI
    hints_pressure_threshold = 0.7   # hint when at 70% of first threshold
    hints_min_interval = 5           # min messages between hints
    knowledge_retention = 10         # messages of critical knowledge to keep

    [[compression.pressure_levels]]
    threshold = 50000
    target_ratio = 2.0    # 50% reduction

    [[compression.pressure_levels]]
    threshold = 100000
    target_ratio = 4.0    # 75% reduction

    [[compression.pressure_levels]]
    threshold = 150000
    target_ratio = 8.0    # 87.5% reduction

    [compression.decision]
    model = "anthropic:claude-haiku-4-5"
    max_tokens = 16000
    temperature = 0.3
    top_p = 1.0
    top_k = 0
    max_retries = 1
    retry_timeout = 30
    ignore_cost = false   # set true to always compress regardless of cost savings
```

Monitor with `/info` — shows compression statistics, tokens saved, cost saved.

