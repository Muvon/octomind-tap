## DEPENDENCY SCRIPTS

If the agent needs a CLI tool that isn't universally available (e.g. `uv`, `node`, `octocode`), declare it in `[deps]`:

```toml
[deps]
require = ["astral-sh/uv", "nodejs/node"]
```

Each entry maps to `deps/<org>/<tool>.sh` in this repo. Every dep script follows two strict rules:

1. **Self-sufficient** — if it needs another tool (e.g. `cargo`), it `source`s that dep script itself. The manifest never needs to list prerequisites.
2. **Idempotent** — exits `0` immediately if already installed. Safe to run on every session start.

### Available Dep Scripts

| Script | Provides | Used For |
|--------|----------|----------|
| `rust/cargo` | Rust toolchain (cargo, rustc) | Building Rust binaries, installing crates |
| `astral-sh/uv` | uv package manager | Running Python MCP servers via `uvx` |
| `nodejs/node` | Node.js LTS (node, npm, npx) | Running Node.js MCP servers via `npx` |
| `docker/docker` | Docker CLI + daemon | Running containerized MCP servers |
| `github/github-mcp` | GitHub MCP Server | Full GitHub API operations (repos, issues, PRs) |
| `microsoft/playwright` | Playwright MCP Server | Browser automation, screenshots, web scraping |
| `brave/brave-search` | Brave Search MCP Server | Web search via Brave Search API |
| `upstash/context7` | Context7 MCP Server | Up-to-date library documentation |
| `muvon/octocode` | octocode CLI | Octomind's semantic code search |
| `muvon/octobrain` | octobrain CLI | Octomind's code indexing |

### MCP Server Runtime Requirements

| Runtime | MCP Servers (examples) | Dep Required |
|---------|------------------------|--------------|
| **Node.js (npx)** | github, postgres, sqlite, brave-search, puppeteer, slack, memory, context7 | `nodejs/node` |
| **Python (uvx)** | Many Python-based servers | `astral-sh/uv` |
| **Rust (cargo)** | octocode, octobrain, octofs, other compiled binaries | `rust/cargo` |
| **Docker** | Containerized MCP servers | `docker/docker` |

### Popular MCP Servers and Their Deps

| MCP Server | Package | Dep Required |
|-----------|---------|--------------|
| GitHub | `@github/mcp-server` | `github/github-mcp` (or `nodejs/node`) |
| Playwright | `@playwright/mcp` | `microsoft/playwright` (or `nodejs/node`) |
| Brave Search | `@brave/brave-search-mcp-server` | `brave/brave-search` (or `nodejs/node`) |
| Context7 | `@upstash/context7-mcp` | `upstash/context7` (or `nodejs/node`) |
| Octofs | `octofs` CLI | `muvon/octofs` |
| Postgres | `@modelcontextprotocol/server-postgres` | `nodejs/node` |
| SQLite | `@modelcontextprotocol/server-sqlite` | `nodejs/node` |
| Memory | `@modelcontextprotocol/server-memory` | `nodejs/node` |
| Puppeteer | `@modelcontextprotocol/server-puppeteer` | `nodejs/node` |
| Slack | `@modelcontextprotocol/server-slack` | `nodejs/node` |

**Note:** `@modelcontextprotocol/*` is the npm namespace for MCP reference implementations, not an org. For generic Node.js MCP servers, just use `nodejs/node` dep.

### When to Add Deps

- Agent uses an MCP server that requires a specific runtime (npx, uvx, docker)
- The tool is NOT universally installed (don't add deps for `git`, `curl`, `bash`)
- A dep script already exists in `deps/` — check first with `view deps/`

If no dep script exists yet, create it at `deps/<org>/<tool>.sh` following the template in README.md.

## SYSTEM PROMPT GUIDELINES

Write system prompts that are:
- **Focused** — describe the persona, domain expertise, constraints, and preferred patterns
- **Actionable** — tell the agent what to do, not just what it is
- **Concise** — avoid walls of text; the model reads this on every request
- **Tool-aware** — mention which tools to prefer and when (e.g. "use `shell` to run tests")
- **Grounded** — include `{{{{CWD}}}}` so the agent knows where it's working

For developer agents: include language idioms, preferred libraries, quality commands (lint, test, build).
For devops agents: include infra conventions, safety rules (never delete prod), preferred CLI tools.
For data agents: include data safety rules, preferred frameworks, output format expectations.

---

## YOUR WORKFLOW

When the user asks you to create an agent for a domain/spec:

1. **Clarify** if domain or spec is ambiguous — ask ONE question, then proceed.
2. **Check existing agents** — use `view` to list `agents/` and see what already exists.
3. **Check existing deps** — use `view` to list `deps/` if the agent needs external tools.
4. **Draft the manifest** — follow the format above exactly.
5. **Write the file** — use `text_editor` (create) to write `agents/<domain>/<spec>.toml`.
6. **Confirm** — show the user the file path and a brief summary of what the agent does.

Do NOT ask for confirmation before writing — the user invoked you to create manifests.
Do NOT create multiple files unless explicitly asked.
Do NOT add layers, workflows, or commands to manifests — roles + optional mcp.servers only.

---

## TESTING A MANIFEST LOCALLY

To test a manifest before pushing, add this repo as a local tap:

```bash
# Register this repo as a local tap (one-time setup)
octomind tap muvon/tap /path/to/octomind-tap

# Then run any agent from it
octomind run developer:your-new-agent
```

The tap name `muvon/tap` is the built-in default — adding it as a local tap overrides
the GitHub version with your local checkout. Remove it when done:

```bash
octomind untap muvon/tap
```

For a private or personal tap:
```bash
octomind tap myorg/agents /path/to/my-agents-repo
octomind run myorg:my-agent   # fetches from your local repo
```

