## PLACEHOLDER VARIABLES

Run `octomind vars` to see all available placeholders:

```bash
octomind vars              # List all placeholders
octomind vars --preview    # Show preview values
octomind vars --expand     # Show full values
```

**Special placeholders:**

| Placeholder | Description |
|-------------|-------------|
| `{{{{INPUT:KEY}}}}` | Prompts user once, stored in `~/.local/share/octomind/inputs.toml` |
| `{{{{ENV:KEY}}}}` | Reads from environment; if unset, prompts and saves to `./.env` |

### When to Use Each Placeholder

**`{{{{INPUT:KEY}}}}` — User Global Secrets**
- Use for: API tokens, credentials, passwords, personal keys
- Stored in: `~/.local/share/octomind/inputs.toml` (user's home, global)
- Prompted: Once, then reused across all projects
- Example: `{{{{INPUT:GITHUB_TOKEN}}}}`, `{{{{INPUT:OPENAI_API_KEY}}}}`

```toml
# In system prompt:
"Your GitHub token: {{{{INPUT:GITHUB_TOKEN}}}}"

# In MCP server config:
[[mcp.servers]]
name = "github"
type = "stdio"
command = "npx"
args = ["-y", "@github/mcp-server"]
env = { GITHUB_TOKEN = "{{{{INPUT:GITHUB_TOKEN}}}}" }
timeout_seconds = 60
tools = []
```

**`{{{{ENV:KEY}}}}` — Project-Scoped Values**
- Use for: Base URLs, environment names, feature flags, project settings
- Stored in: `./.env` (project directory, git-ignored)
- Prompted: Once per project if not in environment
- Example: `{{{{ENV:API_BASE_URL}}}}`, `{{{{ENV:NODE_ENV}}}}`, `{{{{ENV:DATABASE_URL}}}}`

```toml
# In system prompt:
"Working against API: {{{{ENV:API_BASE_URL}}}}"

# In MCP server config:
[[mcp.servers]]
name = "postgres"
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres"]
env = { POSTGRES_URL = "{{{{ENV:DATABASE_URL}}}}" }
timeout_seconds = 60
tools = []
```

**Decision Guide:**

| Value Type | Use | Reason |
|------------|-----|--------|
| API key (personal) | `{{{{INPUT:API_KEY}}}}` | Secret, user-global |
| API key (project-specific) | `{{{{INPUT:PROJECT_API_KEY}}}}` | Secret, but named per-project |
| Base URL | `{{{{ENV:BASE_URL}}}}` | Non-secret, project-specific |
| Environment name | `{{{{ENV:NODE_ENV}}}}` | Non-secret, project-specific |
| Database URL | `{{{{ENV:DATABASE_URL}}}}` | May contain password, but project-scoped |
| OAuth token | `{{{{INPUT:OAUTH_TOKEN}}}}` | Secret, user-global |
| Feature flag | `{{{{ENV:FEATURE_FLAG}}}}` | Non-secret, project-specific |

