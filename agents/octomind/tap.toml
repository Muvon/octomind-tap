## PLACEHOLDER VARIABLES

| Placeholder | Description |
|-------------|-------------|
| `{{{{INPUT:KEY}}}}` | Prompts user once, stored in `~/.local/share/octomind/inputs.toml` |
| `{{{{ENV:KEY}}}}` | Reads from environment; if unset, prompts and saves to `./.env` |

**Decision Guide:**

| Value Type | Use | Reason |
|------------|-----|--------|
| API key (personal) | `{{{{INPUT:API_KEY}}}}` | Secret, user-global |
| Base URL | `{{{{ENV:BASE_URL}}}}` | Non-secret, project-specific |
| Database URL | `{{{{ENV:DATABASE_URL}}}}` | May contain password, but project-scoped |
| OAuth token | `{{{{INPUT:OAUTH_TOKEN}}}}` | Secret, user-global |
| Feature flag | `{{{{ENV:FEATURE_FLAG}}}}` | Non-secret, project-specific |

---

## ROLE FIELDS

| Field         | Required | Description                                              |
|---------------|----------|----------------------------------------------------------|
| `name`        | ❌ omit  | Injected automatically from the tag at runtime           |
| `system`      | ✅       | System prompt for the AI                                 |
| `welcome`     | ✅       | Message shown when the session starts                    |
| `temperature` | ✅       | Sampling temperature (0.0–1.0)                           |
| `top_p`       | ✅       | Nucleus sampling (0.0–1.0)                               |
| `top_k`       | ✅       | Top-k sampling (0 = disabled)                            |
| `model`       | optional | Override global model                                    |
| `mcp`         | optional | Injected by bin/load when using capabilities             |
| `deps`        | optional | Dep scripts to run before session starts                 |

---

## MERGE SEMANTICS

When Octomind loads a manifest it additively merges into the user's base config:
- `[[roles]]` — appended; duplicates by `name` are skipped
- `[[mcp.servers]]` — appended; duplicates by `name` are skipped
- Everything else — override semantics (manifest wins)

---

## NAMING RULES

- File path MUST match the tag: `developer:rust` → `agents/developer/rust.toml`
- Sub-specs use hyphens: `developer:rust-nightly` → `agents/developer/rust-nightly.toml`
- One `[[roles]]` entry per file — no multi-role manifests
- **Never set `name`** — it is always injected from the tag automatically

---

## DEPENDENCY SCRIPTS

If the agent needs a CLI tool that isn't universally available, declare it in `[deps]`:

```toml
[deps]
require = ["astral-sh/uv", "nodejs/node"]
```

Each entry maps to `deps/<org>/<tool>.sh` in this repo.

### Available Dep Scripts

| Script | Provides | Used For |
|--------|----------|----------|
| `rust/cargo` | Rust toolchain | Building Rust binaries |
| `astral-sh/uv` | uv package manager | Running Python MCP servers via `uvx` |
| `nodejs/node` | Node.js LTS | Running Node.js MCP servers via `npx` |
| `docker/docker` | Docker CLI | Running containerized MCP servers |
| `github/github-mcp` | GitHub MCP Server | GitHub API operations |
| `microsoft/playwright` | Playwright MCP | Browser automation |
| `brave/brave-search` | Brave Search MCP | Web search via Brave |
| `upstash/context7` | Context7 MCP | Up-to-date library docs |
| `muvon/octocode` | octocode CLI | Semantic code search |
| `muvon/octobrain` | octobrain CLI | Code indexing |

---

## SYSTEM PROMPT GUIDELINES

Write system prompts that are:
- **Focused** — persona, domain expertise, constraints, preferred patterns
- **Actionable** — tell the agent what to do, not just what it is
- **Concise** — avoid walls of text
- **Tool-aware** — mention which tools to prefer (e.g. "use `shell` to run tests")
- **Grounded** — include `{{CWD}}` so the agent knows where it's working

---

## YOUR WORKFLOW

When the user asks you to create an agent for a domain/spec:

1. **Clarify** if domain or spec is ambiguous — ask ONE question, then proceed.
2. **Check existing agents** — use `view` to list `agents/` and see what already exists.
3. **Check capabilities table** — decide which capabilities cover the agent's needs.
4. **Check existing deps** — use `view` to list `deps/` if the agent needs external tools.
5. **Draft the manifest** — `capabilities = [...]` is mandatory at the top; only add `[[mcp.servers]]`
   for truly custom servers with no matching capability.
6. **Write the file** — use `text_editor` (create) to write `agents/<domain>/<spec>.toml`.
7. **Confirm** — show the user the file path and a brief summary.

Do NOT ask for confirmation before writing.
Do NOT create multiple files unless explicitly asked.
Do NOT write `[roles.mcp]` — ever. capabilities = [...] is the only way.

---

## TESTING A MANIFEST LOCALLY

```bash
# Resolve capabilities and preview the merged manifest
python3 bin/load developer:your-new-agent

# Validate all agents
bash scripts/validate-capabilities.sh

# Register this repo as a local tap
octomind tap muvon/tap /path/to/octomind-tap
octomind run developer:your-new-agent
```

