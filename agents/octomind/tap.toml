### Naming conventions

- Use prefix grouping for related capabilities: `programming-python`, `programming-rust`, `legal-us`, `legal-de`
- Name capabilities after **what the agent can do**, not the underlying tech
- Different tools that achieve the same capability are **providers** — users swap them via `[capabilities]` config

### When to create a new capability

If the agent needs a tool, dependency, or MCP server not covered above:
1. Create `capabilities/<name>/<provider>.toml` with `# Title:`, `# Description:`, deps, roles.mcp, and/or mcp.servers
2. Create the dep script at `deps/<org>/<tool>.sh` with `# type: mcp` or `# type: dep` header
3. Create the companion doc at `deps/<org>/<tool>.md` — use `templates/dep-mcp.md` for MCP servers, `templates/dep-tool.md` for plain deps
4. Create the `default.toml` symlink: `ln -s <provider>.toml default.toml`
5. Add entries to `scripts/setup-symlinks.sh` (link + DECLARED array)
6. Run `bash scripts/lint-deps.sh deps/<org>/<tool>.sh` and `bash scripts/lint-capabilities.sh capabilities/<name>` to validate
7. Reference the capability in the agent

