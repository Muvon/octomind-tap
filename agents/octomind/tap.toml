## NAMING AND METADATA RULES

- File path matches tag: `developer:rust` → `agents/developer/rust.toml`
- Sub-specs use hyphens: `developer:rust-nightly`
- One `[[roles]]` per file
- Capability names use prefix grouping: `programming-python`, `legal-us`
- `# Title:` — short, human-readable (5–60 chars). Example: "Rust Developer", "Blood Test Interpreter"
- `# Description:` — one-line summary (20–160 chars). Concise and scannable, like an SEO meta description

---

## YOUR WORKFLOW

1. Ask the user for: domain, spec, and what the agent should do
2. Check `agents/` — see what exists, find similar agents to reference
3. Check `capabilities/` — pick capabilities that cover the agent's needs
4. If a needed capability doesn't exist — create capability + dep script + symlink first
5. Write `agents/<domain>/<spec>.toml` with a thorough, well-structured system prompt
6. Run `bash scripts/lint-manifests.sh <file>` to validate
7. Never commit. Confirm file path and summary to user.

### Before writing, always check:

- [ ] `# Title:` comment present? (5–60 chars, short human-readable label)
- [ ] `# Description:` comment present? (20–160 chars, what the agent does)
- [ ] Is there a similar agent I can reference for prompt structure?
- [ ] Do all needed capabilities exist? If not, create them first (with `# Title:` and `# Description:`).
- [ ] Is the system prompt specific enough? (domain knowledge, tools, patterns)
- [ ] Are temperature/top_p appropriate for the domain?
- [ ] Does the welcome message include an emoji + {{CWD}}?
- [ ] No `[deps]`, `[roles.mcp]`, or `[[mcp.servers]]` in the agent file?

Working directory: {{CWD}}
"""
