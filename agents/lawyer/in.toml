## INDIAN LEGAL SYSTEM

### Constitutional Framework
- **Constitution of India (1950)** — Supreme law; 395 Articles, 12 Schedules
- **Fundamental Rights (Part III)** — Arts. 12-35; enforceable against state
- **Directive Principles (Part IV)** — Non-justiciable but guide legislation
- **Fundamental Duties (Part IVA)** — Art. 51A
- **Federal structure** — Union List, State List, Concurrent List (7th Schedule)
- **Parliamentary system** — Lok Sabha + Rajya Sabha

### Court System
```
Supreme Court of India (New Delhi)
    ↑
High Courts (25 — one per state/group of states)
    ↑
District Courts / Sessions Courts
    ↑
Civil Judge Courts / Judicial Magistrate Courts
    ↑
Executive Magistrate Courts / Tribunals
```

---

## KEY LEGAL AREAS

### Criminal Law — MAJOR REFORM 2023
- **Bharatiya Nyaya Sanhita (BNS) 2023** — Replaced Indian Penal Code (IPC) 1860 from 1 July 2024
- **Bharatiya Nagarik Suraksha Sanhita (BNSS) 2023** — Replaced CrPC 1973
- **Bharatiya Sakshya Adhiniyam (BSA) 2023** — Replaced Indian Evidence Act 1872
- Key rights: Right to remain silent, right to legal representation, bail provisions
- **POCSO Act 2012** — Protection of children from sexual offences

### Civil Law & Procedure
- **Code of Civil Procedure (CPC) 1908** — Civil court procedure
- **Limitation Act 1963** — Time limits for suits
- **Specific Relief Act 1963** — Specific performance, injunctions
- **Transfer of Property Act 1882** — Sale, mortgage, lease, gift of property
- **Registration Act 1908** — Compulsory registration of documents

### Contract Law
- **Indian Contract Act 1872** — Offer, acceptance, consideration, capacity
- **Sale of Goods Act 1930** — Sale of movable goods
- **Consumer Protection Act 2019** — Consumer rights; NCDRC, SCDRC, DCDRC
- **Arbitration and Conciliation Act 1996** — ADR; India-seated arbitrations

### Employment & Labour Law
- **Labour Codes (2019-2020)** — 4 codes consolidating 29 central labour laws:
  - Code on Wages 2019
  - Industrial Relations Code 2020
  - Code on Social Security 2020
  - Occupational Safety, Health and Working Conditions Code 2020
- **Maternity Benefit Act 1961** — 26 weeks paid maternity leave
- **Equal Remuneration Act 1976** — Equal pay for equal work

### Company & Business Law
- **Companies Act 2013** — Company formation, directors, compliance; MCA21 portal
- **LLP Act 2008** — Limited Liability Partnerships
- **Insolvency and Bankruptcy Code (IBC) 2016** — Corporate insolvency; NCLT
- **FEMA 1999** — Foreign exchange; RBI regulations
- **Competition Act 2002** — Antitrust; CCI enforcement

### Property Law
- **Transfer of Property Act 1882** — Immovable property transactions
- **Registration Act 1908** — Mandatory registration of property documents
- **RERA 2016** — Real Estate Regulation; state RERA authorities
- **Land Acquisition Act 2013** — Compulsory acquisition; compensation

### Data Protection & Privacy
- **Digital Personal Data Protection Act (DPDPA) 2023** — India's comprehensive data law
- **IT Act 2000** — Cybercrime, electronic records, digital signatures
- **IT (Amendment) Act 2008** — Expanded cybercrime provisions
- **CERT-In** — Cybersecurity incident reporting

### Intellectual Property
- **Patents Act 1970** — 20-year protection; CGPDTM
- **Trade Marks Act 1999** — Registration and protection
- **Copyright Act 1957** — Life + 60 years
- **Designs Act 2000** — Industrial designs

### Family Law (Personal Laws)
- **Hindu Marriage Act 1955** — Hindus, Buddhists, Jains, Sikhs
- **Muslim Personal Law (Shariat) Application Act 1937** — Muslims
- **Indian Christian Marriage Act 1872** — Christians
- **Special Marriage Act 1954** — Inter-faith and civil marriages
- **Hindu Succession Act 1956** — Inheritance for Hindus
- **Guardians and Wards Act 1890** — Child custody

