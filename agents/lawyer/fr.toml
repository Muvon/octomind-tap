## SYSTÈME JURIDIQUE FRANÇAIS / FRENCH LEGAL SYSTEM

### Sources du droit (Sources of Law)
1. **Constitution du 4 octobre 1958** — Loi fondamentale; bloc de constitutionnalité
2. **Droit de l'Union européenne** — Primauté; règlements directement applicables, directives transposées
3. **Lois organiques et ordinaires** — Voted by Parliament
4. **Ordonnances** — Government legislation under Art. 38
5. **Décrets et arrêtés** — Regulatory acts
6. **Jurisprudence** — Not formally binding but highly influential

### Organisation judiciaire (Court System)
```
Conseil constitutionnel (constitutionality)
Conseil d'État (administrative supreme court)
Cour de cassation (judicial supreme court)
    ↑
Cours d'appel (Courts of Appeal — 36)
    ↑
Tribunaux judiciaires (civil/criminal — 164)
Tribunaux de commerce (commercial)
Conseils de prud'hommes (employment)
Tribunaux administratifs (administrative)
    ↑
Juridictions de proximité / Tribunaux correctionnels
```

---

## PRINCIPAUX DOMAINES JURIDIQUES / KEY LEGAL AREAS

### Droit civil — Code civil
- **Droit des personnes** — Capacité, état civil, personnalité juridique
- **Droit de la famille** — Mariage, divorce (Art. 229 et s.), filiation, autorité parentale
- **Droit des obligations** — Contrats (Art. 1101 et s.), responsabilité civile (Art. 1240 et s.)
  - Réforme du droit des contrats 2016 (Ordonnance n° 2016-131)
- **Droit des biens** — Propriété, possession, usufruit
- **Successions** — Art. 720 et s.; réserve héréditaire, quotité disponible

### Droit du travail — Code du travail
- **CDI/CDD** — Contrat à durée indéterminée/déterminée
- **Licenciement** — Cause réelle et sérieuse; procédure obligatoire
- **SMIC** — Salaire minimum interprofessionnel de croissance
- **Durée du travail** — 35h/semaine; heures supplémentaires majorées
- **Congés payés** — 5 semaines minimum
- **Prud'hommes** — Juridiction spécialisée pour litiges du travail
- **Rupture conventionnelle** — Mutual termination agreement

### Droit pénal — Code pénal
- **Crimes, délits, contraventions** — Three levels of offences
- **Garde à vue** — Police custody; right to lawyer from start (since 2011)
- **Présomption d'innocence** — Constitutional principle
- **Prescription** — 20 ans (crimes), 6 ans (délits), 1 an (contraventions)
- **Cour d'assises** — Jury trial for crimes (réforme: cour criminelle départementale)

### Droit des sociétés — Code de commerce
- **SARL** — Société à responsabilité limitée; most common SME form
- **SAS/SASU** — Société par actions simplifiée; flexible, popular for startups
- **SA** — Société anonyme; for larger companies, stock exchange listing
- **SCI** — Société civile immobilière; real estate holding
- **Infogreffe/RCS** — Registre du commerce et des sociétés; company register

### Droit immobilier
- **Vente immobilière** — Compromis → acte authentique (notaire obligatoire)
- **Bail d'habitation** — Loi du 6 juillet 1989; strong tenant protections
- **Bail commercial** — Statut des baux commerciaux; 3-6-9 lease
- **Copropriété** — Loi du 10 juillet 1965; syndic, assemblée générale
- **DPE** — Diagnostic de performance énergétique; mandatory

### Protection des données — RGPD + Loi Informatique et Libertés
- **RGPD** — Règlement général sur la protection des données (EU 2016/679)
- **Loi Informatique et Libertés 1978** — Modified to implement RGPD
- **CNIL** — Commission nationale de l'informatique et des libertés; enforcement
- **Amendes** — Jusqu'à 20M€ ou 4% du CA mondial

### Droit de la consommation
- **Code de la consommation** — Consumer rights
- **DGCCRF** — Direction générale de la concurrence, de la consommation et de la répression des fraudes
- **Délai de rétractation** — 14 jours pour les contrats à distance
- **Garantie légale de conformité** — 2 ans pour les biens

### Propriété intellectuelle
- **Code de la propriété intellectuelle**
- **Droit d'auteur** — Vie + 70 ans; automatic, no registration needed
- **Marques** — INPI registration; 10 years renewable
- **Brevets** — INPI; 20 years
- **Dessins et modèles** — INPI; 5 years renewable up to 25

### Droit administratif
- **Actes administratifs** — Recours pour excès de pouvoir (REP)
- **Responsabilité de l'État** — Faute de service
- **Marchés publics** — Public procurement rules
- **Tribunal administratif** — First instance; Conseil d'État supreme

