### KEY US LEGAL AREAS

### Employment Law
- At-will employment ‚Äî Most states; employer can terminate for any non-discriminatory reason
- Federal protections ‚Äî Title VII, ADA, ADEA, FMLA, FLSA, NLRA
- State variations ‚Äî California, New York, Massachusetts have stronger worker protections
- Non-competes ‚Äî Banned in California; enforceable with limits in most states
- Minimum wage ‚Äî Federal $7.25/hr; many states/cities higher

### Contract Law (UCC + Common Law)
- UCC Article 2 ‚Äî Governs sale of goods
- Common law ‚Äî Governs services, real estate, employment
- Formation ‚Äî Offer, acceptance, consideration, capacity, legality
- Statute of Frauds ‚Äî Contracts over $500 (goods), real estate, 1+ year must be written

### Criminal Law
- Miranda rights ‚Äî Right to remain silent, right to attorney
- 4th Amendment ‚Äî Protection against unreasonable search and seizure
- 5th Amendment ‚Äî Self-incrimination, due process
- 6th Amendment ‚Äî Right to speedy trial, counsel, confrontation
- Felony vs. misdemeanor ‚Äî Varies by state; generally felony = 1+ year prison

### Business Law
- Entity types ‚Äî Sole proprietorship, LLC, C-Corp, S-Corp, Partnership, LLP
- Delaware advantage ‚Äî Most corporations incorporate in Delaware
- Securities law ‚Äî SEC regulates; state "Blue Sky" laws also apply
- Antitrust ‚Äî Sherman Act, Clayton Act, FTC Act

### Privacy & Data Law
- Federal ‚Äî HIPAA (health), COPPA (children), GLBA (financial), FERPA (education)
- California ‚Äî CCPA/CPRA (strongest state privacy law)
- State breach notification ‚Äî All 50 states have laws; use `compare_requirements` for comparison
- No federal comprehensive privacy law ‚Äî Patchwork of sector-specific laws

### Immigration Law
- Visa categories ‚Äî B-1/B-2 (visitor), F-1 (student), H-1B (specialty worker), L-1 (intracompany), O-1 (extraordinary ability), EB (employment-based green card)
- USCIS ‚Äî Handles most immigration applications
- Always consult an immigration attorney ‚Äî Mistakes can be irreversible

### Intellectual Property
- Patents ‚Äî USPTO; utility (20 yr), design (15 yr), plant (20 yr)
- Trademarks ‚Äî USPTO; renewable indefinitely with use
- Copyright ‚Äî Automatic upon creation; life + 70 years
- Trade secrets ‚Äî DTSA (federal) + state laws

### LEGAL AID RESOURCES

- Legal Services Corporation ‚Äî lsc.gov (free civil legal aid)
- State bar lawyer referral ‚Äî Each state bar has a referral service
- Law school clinics ‚Äî Free legal help from supervised law students
- ACLU ‚Äî Civil liberties issues
- EEOC ‚Äî Employment discrimination
- FTC ‚Äî Consumer protection
- CFPB ‚Äî Consumer financial protection
