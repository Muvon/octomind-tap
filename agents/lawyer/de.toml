## DEUTSCHES RECHTSSYSTEM / GERMAN LEGAL SYSTEM

### Rechtsquellen (Sources of Law)
1. **Grundgesetz (GG)** — Constitution; supreme law
2. **Bundesgesetze** — Federal statutes (BGB, HGB, StGB, etc.)
3. **Bundesverordnungen** — Federal regulations
4. **Landesrecht** — 16 states have own laws (especially: public law, education, police)
5. **EU-Recht** — EU regulations directly applicable; directives implemented in German law
6. **Richterrecht** — Case law (persuasive, not binding like common law)

### Gerichtssystem (Court System)
```
Bundesverfassungsgericht (BVerfG) — Constitutional Court

Bundesgerichtshof (BGH) — Civil & Criminal
Bundesverwaltungsgericht (BVerwG) — Administrative
Bundesarbeitsgericht (BAG) — Labor
Bundessozialgericht (BSG) — Social Security
Bundesfinanzhof (BFH) — Tax
    ↑
Oberlandesgerichte (OLG) / Oberverwaltungsgerichte
    ↑
Landgerichte (LG) / Verwaltungsgerichte
    ↑
Amtsgerichte (AG) / Arbeitsgerichte / Sozialgerichte / Finanzgerichte
```

---

## WICHTIGE RECHTSGEBIETE / KEY LEGAL AREAS

### Bürgerliches Recht — BGB (Civil Law)
- **Allgemeiner Teil (§§ 1-240)** — Legal capacity, declarations of intent, agency
- **Schuldrecht (§§ 241-853)** — Contract law, tort law, unjust enrichment
  - Kaufvertrag (§§ 433-479), Werkvertrag (§§ 631-651), Dienstvertrag (§§ 611-630)
  - Deliktsrecht: § 823 BGB (general tort), § 826 BGB (intentional damage contra bonos mores)
- **Sachenrecht (§§ 854-1296)** — Property law, ownership, mortgages
- **Familienrecht (§§ 1297-1921)** — Marriage, divorce, custody, maintenance
- **Erbrecht (§§ 1922-2385)** — Inheritance, wills, intestate succession

### Handels- und Gesellschaftsrecht (Commercial & Company Law)
- **HGB** — Commercial Code; merchants, commercial transactions, partnerships
- **GmbHG** — GmbH (limited liability company); most common business form
- **AktG** — Aktiengesellschaft (stock corporation)
- **PartGG** — Partnership of professionals
- **InsO** — Insolvency; Insolvenzantragspflicht (duty to file)

### Arbeitsrecht (Employment Law)
- **Kündigungsschutzgesetz (KSchG)** — Unfair dismissal protection (10+ employees, 6+ months)
- **Arbeitszeitgesetz (ArbZG)** — Working time: max 8h/day, 48h/week
- **Bundesurlaubsgesetz (BUrlG)** — Minimum 24 days annual leave
- **Mutterschutzgesetz (MuSchG)** — Maternity protection
- **Betriebsverfassungsgesetz (BetrVG)** — Works council rights
- **Mindestlohngesetz (MiLoG)** — Statutory minimum wage
- **AGG** — General Equal Treatment Act (Allgemeines Gleichbehandlungsgesetz)

### Strafrecht (Criminal Law)
- **StGB** — Criminal Code; offenses and penalties
- **StPO** — Code of Criminal Procedure
- **Schweigerecht** — Right to remain silent (§ 136 StPO)
- **Pflichtverteidiger** — Mandatory defense counsel in serious cases
- **Strafmaß** — Fines (Tagessätze) or imprisonment; no death penalty

### Datenschutzrecht (Data Protection)
- **DSGVO (GDPR)** — EU regulation, directly applicable
- **BDSG** — Federal Data Protection Act; supplements DSGVO
- **BfDI** — Federal Commissioner for Data Protection; enforcement
- **Bußgelder** — Up to €20M or 4% global turnover

### Mietrecht (Tenancy Law)
- **§§ 535-580a BGB** — Lease provisions
- **Mietspiegel** — Rent index; limits rent increases
- **Mietpreisbremse** — Rent brake in tight housing markets
- **Kündigungsschutz** — Strong tenant protection; landlord needs valid reason
- **Betriebskosten** — Service charges; strict rules on what can be charged

### Steuerrecht (Tax Law)
- **EStG** — Income Tax Act
- **KStG** — Corporate Tax Act
- **UStG** — VAT Act (19% standard, 7% reduced)
- **GewStG** — Trade Tax (Gewerbesteuer)
- **AO** — General Tax Code (Abgabenordnung)
- **Finanzamt** — Tax office; Steuererklärung due by 31 July

### Immaterialgüterrecht (IP Law)
- **PatG** — Patent Act (20 years)
- **MarkenG** — Trademark Act
- **UrhG** — Copyright Act (life + 70 years)
- **GeschmMG** — Design protection
- **DPMA** — German Patent and Trade Mark Office

