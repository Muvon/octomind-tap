## SINGAPORE LEGAL SYSTEM

### Overview
- **Common law system** — English common law heritage; case law is binding precedent
- **Unitary state** — No federal/state division; one set of national laws
- **Westminster parliamentary system** — Parliament, Executive, Judiciary
- **Application of English Law Act** — English common law applies where no local statute
- **Singapore is a major legal hub** — SIAC arbitration, SICC, Maxwell Chambers

### Court System
```
Court of Appeal (highest appellate court)
    ↑
Appellate Division of the High Court
    ↑
General Division of the High Court
    ↑
State Courts:
  - District Courts (civil up to $250K, criminal up to 10 years)
  - Magistrates' Courts (civil up to $60K, criminal up to 3 years)
  - Community Courts / Family Justice Courts / Employment Claims Tribunal
    ↑
Small Claims Tribunal (up to $20K)
```

### Singapore International Commercial Court (SICC)
- International commercial disputes
- Foreign lawyers can appear
- Judgments enforceable internationally

---

## KEY LEGAL AREAS

### Contract Law
- **Common law** — Offer, acceptance, consideration, intention, capacity
- **Contracts (Rights of Third Parties) Act** — Third party enforcement
- **Unfair Contract Terms Act** — Reasonableness test for exclusion clauses
- **Consumer Protection (Fair Trading) Act** — Unfair practices; CASE
- **Electronic Transactions Act** — Electronic contracts and signatures
- **Limitation Act** — 6 years for contract claims

### Employment Law
- **Employment Act** — Core employment rights; applies to employees earning ≤$4,500/month (non-workmen)
- **Key entitlements** — Annual leave (7-14 days), sick leave, public holidays (11 days)
- **CPF** — Central Provident Fund; mandatory savings (employer + employee contributions)
- **Work Injury Compensation Act** — Workplace injury compensation
- **Employment of Foreign Manpower Act** — Work pass requirements
- **Tripartite Guidelines** — Non-legally binding but widely followed
- **Employment Claims Tribunal** — Dispute resolution for salary and employment claims

### Criminal Law
- **Penal Code** — Main criminal statute; comprehensive
- **Criminal Procedure Code** — Procedure, arrest, bail, trial
- **Misuse of Drugs Act** — Strict drug laws; mandatory death penalty for trafficking above thresholds
- **Public Order Act** — Demonstrations, assemblies
- **Maintenance of Religious Harmony Act** — Religious harmony
- **Right to counsel** — Upon arrest; right to contact lawyer
- **Bail** — Available for most offences; denied for capital offences

### Company Law
- **Companies Act** — Company formation, directors' duties, financial reporting; ACRA
- **Limited Liability Partnerships Act** — LLP structure
- **Business Names Registration Act** — Business name registration
- **Securities and Futures Act** — Capital markets; MAS regulation
- **Insolvency, Restructuring and Dissolution Act (IRDA) 2018** — Consolidated insolvency law
- **ACRA** — Accounting and Corporate Regulatory Authority

### Data Protection
- **Personal Data Protection Act (PDPA) 2012** — Singapore's main data protection law
- **PDPC** — Personal Data Protection Commission; enforcement
- **Mandatory breach notification** — 3 days for significant breaches
- **Do Not Call Registry** — Opt-out for marketing calls/messages
- **2021 Amendments** — Increased fines (up to 10% of annual turnover or $1M)

### Property Law
- **Land Titles Act** — Torrens system; indefeasible title
- **Residential Property Act** — Restrictions on foreign ownership of landed property
- **Housing Development Act** — HDB public housing; eligibility rules
- **Conveyancing and Law of Property Act** — Property transactions
- **Stamp Duties Act** — ABSD (Additional Buyer's Stamp Duty) for foreigners: 60%

### Family Law
- **Women's Charter** — Marriage, divorce, maintenance, custody (non-Muslims)
- **Administration of Muslim Law Act (AMLA)** — Muslim personal law; Syariah Court
- **Guardianship of Infants Act** — Child welfare
- **Intestate Succession Act** — Intestate inheritance (non-Muslims)
- **Probate and Administration Act** — Estate administration

### Immigration
- **Immigration Act** — Entry, stay, and departure
- **Employment Pass** — For professionals earning ≥$5,000/month
- **S Pass** — Mid-skilled workers ≥$3,150/month
- **Work Permit** — Semi-skilled workers; sector quotas
- **Permanent Residence** — PR application via ICA
- **Citizenship** — Singapore citizenship requirements
- **ICA** — Immigration and Checkpoints Authority

### Intellectual Property
- **Patents Act** — 20-year protection; IPOS
- **Trade Marks Act** — Registration; IPOS
- **Copyright Act 2021** — Life + 70 years; automatic
- **Registered Designs Act** — IPOS registration
- **IPOS** — Intellectual Property Office of Singapore

### Arbitration (Singapore as Hub)
- **International Arbitration Act** — UNCITRAL Model Law based
- **SIAC** — Singapore International Arbitration Centre; world-leading
- **SIMC** — Singapore International Mediation Centre
- **Maxwell Chambers** — Premier dispute resolution complex

