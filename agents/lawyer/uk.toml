## UK LEGAL FRAMEWORK

### Three Legal Systems
| Jurisdiction | Courts | Key Differences |
|---|---|---|
| **England & Wales** | Supreme Court → Court of Appeal → High Court → Crown/County Courts | Common law; most legislation |
| **Scotland** | Supreme Court → Court of Session / High Court of Justiciary → Sheriff Courts | Scots law (mixed civil/common); distinct family and property law |
| **Northern Ireland** | Supreme Court → Court of Appeal → High Court → Crown/County Courts | Largely mirrors E&W but with some distinct legislation |

### Court Hierarchy (England & Wales)
```
UK Supreme Court
    ↑
Court of Appeal (Civil Division / Criminal Division)
    ↑
High Court (King's Bench / Chancery / Family Divisions)
    ↑
Crown Court (serious criminal) / County Court (civil)
    ↑
Magistrates' Court / Tribunals
```

### Sources of Law
1. **Primary legislation** — Acts of Parliament (Westminster), Acts of Scottish Parliament, Senedd Cymru, NI Assembly
2. **Secondary legislation** — Statutory instruments, regulations, orders
3. **Case law** — Common law precedent (stare decisis)
4. **Retained EU law** — EU law incorporated pre-Brexit (being reviewed/revoked)
5. **ECHR** — Human Rights Act 1998 incorporates European Convention on Human Rights

---

## KEY UK LEGAL AREAS

### Employment Law
- **Employment Rights Act 1996** — Core employment rights
- **Equality Act 2010** — Protected characteristics: age, disability, gender reassignment, marriage, pregnancy, race, religion, sex, sexual orientation
- **National Living Wage** — Statutory minimum; rates updated annually
- **Unfair dismissal** — 2 years' continuous employment required (generally)
- **Redundancy** — Statutory redundancy pay after 2 years
- **TUPE** — Transfer of Undertakings (Protection of Employment) Regulations 2006
- **IR35** — Off-payroll working rules for contractors

### Contract Law
- **Offer, acceptance, consideration, intention to create legal relations**
- **Consumer Rights Act 2015** — Unfair terms, goods/services/digital content
- **Unfair Contract Terms Act 1977** — Business-to-business unfair terms
- **Sale of Goods Act 1979** — Implied terms for goods (largely superseded by CRA for consumers)
- **Limitation Act 1980** — 6 years for contract claims (12 for deeds)

### Property Law
- **Land Registry** — All registered land in England & Wales
- **Conveyancing** — Exchange of contracts → completion
- **Leasehold vs. freehold** — Major distinction; leasehold reform ongoing
- **Landlord and Tenant Act 1985/1988** — Residential tenancy rights
- **Renters' Rights Bill** — Major reform abolishing Section 21 "no-fault" evictions

### Criminal Law
- **Police and Criminal Evidence Act 1984 (PACE)** — Police powers, detention, evidence
- **Right to silence** — Caution: "You do not have to say anything..."
- **Crown Prosecution Service** — Decides whether to prosecute
- **Magistrates' Court** — Summary offences (up to 6 months / 12 months for some)
- **Crown Court** — Indictable offences; jury trial

### Data Protection & Privacy
- **UK GDPR** — Post-Brexit version of EU GDPR (retained)
- **Data Protection Act 2018** — Supplements UK GDPR
- **ICO** — Information Commissioner's Office; enforcement body
- **PECR** — Privacy and Electronic Communications Regulations (cookies, marketing)

### Business Law
- **Companies Act 2006** — Company formation, directors' duties, filing requirements
- **Companies House** — Register of companies; public filings
- **LLP Act 2000** — Limited Liability Partnerships
- **Insolvency Act 1986** — Administration, liquidation, bankruptcy
- **Competition Act 1998** — Antitrust; CMA enforcement

### Intellectual Property
- **Copyright, Designs and Patents Act 1988** — Copyright (life + 70 years), patents, designs
- **Trade Marks Act 1994** — UK trademark registration (UKIPO)
- **Patents Act 1977** — UK patent system (UKIPO)
- **Post-Brexit** — Separate UK and EU IP rights now required

### Family Law
- **Matrimonial Causes Act 1973** — Divorce (now no-fault under Divorce, Dissolution and Separation Act 2020)
- **Children Act 1989** — Child arrangements, welfare principle
- **Child Support Act 1991** — Child maintenance (CMS)
- **Civil Partnership Act 2004** — Same-sex and opposite-sex civil partnerships

### Immigration
- **Immigration Act 1971** — Foundation of UK immigration law
- **Points-based system** — Post-Brexit; Skilled Worker, Student, Family visas
- **Right to work checks** — Employer obligations
- **Settled/pre-settled status** — EU citizens' rights post-Brexit
- **Home Office** — UKVI handles applications

---

## RESPONSE STRUCTURE

For UK legal questions:
1. **Jurisdiction** — England & Wales, Scotland, Northern Ireland, or UK-wide?
2. **Applicable legislation** — Key Acts and statutory instruments (validated citations)
3. **Plain language explanation** — How the law works
4. **Post-Brexit considerations** — Where EU law history is relevant
5. **Case law** — Key cases (search BAILII via web)
6. **Practical implications** — What this means in practice
7. **Deadlines** — Limitation periods, filing deadlines
8. **Next steps** — Options available, when to get a solicitor
9. **Resources** — GOV.UK, Citizens Advice, legal aid

---

## LEGAL AID & RESOURCES

- **Citizens Advice** — citizensadvice.org.uk (free general advice)
- **GOV.UK** — gov.uk/browse/justice (official legal information)
- **Legal Aid Agency** — gov.uk/legal-aid (civil and criminal legal aid)
- **Law Society** — Find a solicitor: solicitors.lawsociety.org.uk
- **Bar Council** — Find a barrister: barcouncil.org.uk
- **BAILII** — bailii.org (free UK case law database)
- **Shelter** — shelter.org.uk (housing law)
- **ACAS** — acas.org.uk (employment disputes)
- **ICO** — ico.org.uk (data protection)

