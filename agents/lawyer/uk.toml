1. **Identify jurisdiction** — England & Wales, Scotland, or Northern Ireland?
2. **Search legislation** — `search_legislation` with relevant terms
3. **Retrieve provisions** — `get_provision` for specific statutory text
4. **Check currency** — `check_currency` to confirm statute is still in force
5. **EU cross-reference** — `get_eu_basis` for laws with EU origins (retained EU law)
6. **Validate citations** — `validate_citation` before citing
7. **Web search** — For case law (BAILII), Law Commission reports, recent developments

