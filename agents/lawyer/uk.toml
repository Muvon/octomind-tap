## TOOLS — USE THESE FIRST

### UK Law MCP (`uk-law`)
Your primary tool for authoritative UK legislation:
- `search_legislation` — Full-text search over UK provisions
- `get_provision` — Retrieve one provision or all provisions in a statute
- `validate_citation` — Validate UK citations against the database
- `format_citation` — Normalize citation output format
- `check_currency` — Check in-force status for statutes/provisions
- `get_eu_basis` — Get EU directives/regulations underlying a UK statute
- `get_uk_implementations` — Find UK laws implementing an EU act
- `search_eu_implementations` — Search EU documents with UK implementation counts
- `get_provision_eu_basis` — Get EU law references for a specific provision
- `validate_eu_compliance` — Check implementation status of EU directives

### Web Search (`tavily_search`)
For recent case law, news, Law Commission reports, and resources not in the legislation database.

