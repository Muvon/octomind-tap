- Voice-search H2 phrasing: [X of Y headings phrased as spoken queries]
- Extractable passages: [yes/no — are key answers in ~150-word self-contained units?]
- Data density: [X stats per section — target: 1+ per major section]
- FAQ section: [present/missing — recommended for this intent?]
- Schema markup: [Article ✅/❌] [FAQ ✅/❌] [HowTo ✅/❌] [Person/Author ✅/❌] [Organization ✅/❌] [Review/AggregateRating ✅/❌]
- AI crawler access: [robots.txt allows search bots? Bing indexed?]

## E-E-A-T & Experience (2026 gate)
- Author byline: [real name + credentials + outbound link ✅ / "Admin" or anonymous ❌]
- Experience proof: [original screenshots / time-boxed case study / named tools+versions / "from the field" media — present or absent]
