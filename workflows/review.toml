# Title: Review — Diff to Verified Verdict
#
# Public workflow: review the current unstaged changes through three independent
# lenses in parallel, independently verify and dedup the findings to prune false
# positives, then branch on a deterministic verdict into an approval note or a
# prioritized fix list. Public roles only.

name        = "review"
description = "Review the current unstaged changes through correctness, security, and maintainability lenses in parallel, independently verify and dedup the findings, then branch on a deterministic verdict to an approval note or a prioritized fix list."

# ── 1. Parallel review — three independent lenses ─────────────────────────────
# Fan out the review across distinct lenses in parallel (perspective-diverse
# voting catches what one pass misses). min_success = 2 tolerates a flaky lens;
# the verifier reads the whole block via {{review}} and dedups across lenses.
[[steps]]
name        = "review"
parallel    = true
min_success = 2

  [[steps.run]]
  name    = "correctness"
  role    = "developer:general"
  session = "fresh"
  prompt  = """
Review the current unstaged git changes against this request through the
CORRECTNESS & DESIGN lens: logic bugs, broken edge cases, wrong error handling,
race conditions, API/contract misuse. Read beyond the diff — open the callers,
tests, and config the changed lines touch.

<request>
{{input}}
</request>

Lean toward recall — surface every candidate in your lens; a later step prunes
false positives. Output ONLY a findings list, one block per finding:

- DIMENSION: correctness
  SEVERITY: Blocking | Recommended | Nit
  ANCHOR: path/to/file.ext:line
  WHY: one concise sentence — the concrete problem
  FIX: one concrete suggested change

If you find nothing in this lens, output exactly: NO FINDINGS
"""

  [[steps.run]]
  name    = "security"
  role    = "developer:general"
  session = "fresh"
  prompt  = """
Review the current unstaged git changes against this request through the
SECURITY lens: injection, auth/authz gaps, unsafe input handling, secrets in
code, unsafe deserialization, path traversal/SSRF, dependency risk. Read beyond
the diff — open the callers, tests, and config the changed lines touch.

<request>
{{input}}
</request>

Lean toward recall — surface every candidate in your lens; a later step prunes
false positives. Output ONLY a findings list, one block per finding:

- DIMENSION: security
  SEVERITY: Blocking | Recommended | Nit
  ANCHOR: path/to/file.ext:line
  WHY: one concise sentence — the concrete problem
  FIX: one concrete suggested change

If you find nothing in this lens, output exactly: NO FINDINGS
"""

  [[steps.run]]
  name    = "maintainability"
  role    = "developer:general"
  session = "fresh"
  prompt  = """
Review the current unstaged git changes against this request through the TESTS,
PERFORMANCE & MAINTAINABILITY lens: missing or weak test coverage, needless
allocation or N+1 work, dead code, unclear naming, leaky abstractions. Read
beyond the diff — open the callers, tests, and config the changed lines touch.

<request>
{{input}}
</request>

Lean toward recall — surface every candidate in your lens; a later step prunes
false positives. Output ONLY a findings list, one block per finding:

- DIMENSION: performance | maintainability | tests
  SEVERITY: Blocking | Recommended | Nit
  ANCHOR: path/to/file.ext:line
  WHY: one concise sentence — the concrete problem
  FIX: one concrete suggested change

If you find nothing in this lens, output exactly: NO FINDINGS
"""

# ── 2. Verify (independent precision gate) ───────────────────────────────────
[[steps]]
name    = "verify"
role    = "developer:general"
session = "fresh"
prompt  = """
You are an independent verifier. Below are findings from three independent
reviewers (correctness, security, and maintainability lenses), joined under
per-lens headers. Re-check each against the actual current code — do not trust
the reviewers' reasoning. Open the anchored file:line and confirm the problem is
real before keeping it.

<request>
{{input}}
</request>

<findings>
{{review}}
</findings>

Merge duplicates that more than one lens reported. For every finding decide KEEP
or DROP with a one-line justification. DROP any finding that is not provably
anchored in the code, is a duplicate, or is pure speculation. Then list only the
KEPT findings, each with its DIMENSION, SEVERITY, ANCHOR, WHY, and FIX.

Compute the verdict mechanically from the kept findings: if any kept finding has
SEVERITY Blocking, the verdict is REQUEST_CHANGES; otherwise it is APPROVED.

End with exactly one line: `VERDICT: APPROVED` or `VERDICT: REQUEST_CHANGES`.
Nothing after it.
"""

# ── 3. Conditional verdict ───────────────────────────────────────────────────
[[steps]]
name        = "verdict"
conditional = true
condition   = { output = "verify", matches = '(?m)^VERDICT: APPROVED' }
on_match    = ["approve"]
on_no_match = ["fixes"]

  [[steps.run]]
  name    = "approve"
  role    = "developer:brief"
  session = "fresh"
  prompt  = """
The change is approved — only non-blocking findings remain. Write a short
approval note: summarize what the change does and list any Recommended/Nit
findings as optional follow-ups.

<verified>
{{verify}}
</verified>
"""

  [[steps.run]]
  name    = "fixes"
  role    = "developer:general"
  session = "fresh"
  prompt  = """
The change needs work — at least one Blocking finding remains. Turn the verified
findings into a concise, severity-ordered fix list a developer can act on
directly: each item names the file:line, the problem, and the concrete fix.

<verified>
{{verify}}
</verified>
"""
