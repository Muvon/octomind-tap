# Title: Localize — One Text, Many Markets
#
# Public workflow: resolve the target locales from the input (or a default set),
# transcreate the input into every locale in parallel via dynamic fan-out — one
# translator branch per locale — then QA them all in one pass. Public roles only.
#
# Requires octomind with dynamic `match` fan-out support.

name        = "localize"
description = "Resolve target locales from the input (or default), transcreate the input into each locale in parallel via dynamic fan-out, then QA all locales in one pass with a per-locale verdict."

# ── 1. Plan: resolve the target locales ──────────────────────────────────────
[[steps]]
name    = "plan"
role    = "assistant:general"
session = "fresh"
prompt  = """
Determine the target locales for translating the text below.

<input>
{{input}}
</input>

If the input names specific target languages or locales, use exactly those.
Otherwise default to: es-ES, fr-FR, de-DE, ja-JP. Emit ONE BCP-47 tag per locale,
each on its own line wrapped in a <locale> tag, and nothing else:

<locale>es-ES</locale>
<locale>fr-FR</locale>

Output only the <locale>…</locale> lines.
"""

# ── 2. Transcreate each locale (dynamic fan-out: one branch per locale) ───────
# `match` maps the single translator template over every <locale> the plan
# emitted. Inside the template, {{translate}} is the current locale (the loop
# variable bound to the block name). min_success = 1 so one flaky locale can't
# sink the rest; downstream, {{translator}} holds all branch outputs joined.
[[steps]]
name         = "translate"
parallel     = true
match        = "(?s)<locale>(.*?)</locale>"
min_success  = 1
max_parallel = 4

  [[steps.run]]
  name    = "translator"
  role    = "content:translate"
  session = "fresh"
  prompt  = """
Transcreate the text below into {{translate}} — sense-for-sense with locale-aware
cultural adaptation; recreate the impact, never literal. Preserve meaning, voice,
and structure; keep code, placeholders, and URLs verbatim.

<source>
{{input}}
</source>

Begin with the locale tag on its own line: [{{translate}}]
Then output only the translation.
"""

# ── 3. QA all locales in one pass ────────────────────────────────────────────
[[steps]]
name    = "qa"
role    = "content:translate"
session = "fresh"
prompt  = """
QA the transcreations below against the source. For each locale, back-translate
the critical passages and check meaning fidelity, register/tone, cultural fit, and
that code, placeholders, and URLs are intact.

<source>
{{input}}
</source>

<translations>
{{translator}}
</translations>

For each locale, list any findings severity-ordered, then end that locale's block
with one line: QA-VERDICT <locale>: ADEQUATE or QA-VERDICT <locale>: REVISE.
"""
