# Title: Localize — One Text, Many Markets, Native-Sounding
#
# Public workflow: transcreate one input (one or more articles/files) into
# several locales in parallel, then drive EACH locale through its own
# native-fluency audit/fix loop until it reads as if a native speaker wrote it
# from scratch — no translationese, no AI-slop — scored via the
# `content-locale-humanize` rubric (structural-pattern based, domain-
# calibrated, not a per-language word list). Fork the sub-steps to change
# target languages.
#
# Note: LLM self-evaluation shares blind spots with same-family generator
# models — for higher-stakes content, set `model` on the `*_audit` sub-steps
# to a different provider than the transcreation default.
#
# Note: loops are capped at 2 rounds on purpose, not raised for "more polish."
# Research on iterative LLM self-refinement (TEaR, Self-Refine) finds quality
# peaks around the first correction pass and can decline with more rounds — the
# scorer's judgment is the bottleneck, not iteration count. If round 2 still
# fails, escalate to a different model or a human rather than looping further.
#
# Public roles only.

name        = "localize"
description = "Transcreate one input (one or more articles/files) into Spanish, French, German, and Japanese in parallel, then drive each locale through a native-fluency audit/fix loop until it reads as native-written, not translated."

# ── 1. Parallel transcreation ────────────────────────────────────────────────
[[steps]]
name     = "transcreate"
parallel = true

  [[steps.run]]
  name    = "spanish"
  role    = "content:translate"
  session = "fresh"
  prompt  = """
Transcreate the following into Spanish (es-ES) as a native Spanish speaker would
write it from scratch, never literal. Detect the content domain (technical,
legal, marketing, academic, casual, ...) and calibrate register and terminology
to it. Preserve meaning, voice, and structure; keep code, placeholders, and URLs
verbatim. If the input contains more than one article or file, translate every
one completely and output each as its own clearly delimited block, same order.

<source>
{{input}}
</source>

Output only the Spanish transcreation(s).
"""

  [[steps.run]]
  name    = "french"
  role    = "content:translate"
  session = "fresh"
  prompt  = """
Transcreate the following into French (fr-FR) as a native French speaker would
write it from scratch, never literal. Detect the content domain (technical,
legal, marketing, academic, casual, ...) and calibrate register and terminology
to it. Preserve meaning, voice, and structure; keep code, placeholders, and URLs
verbatim. If the input contains more than one article or file, translate every
one completely and output each as its own clearly delimited block, same order.

<source>
{{input}}
</source>

Output only the French transcreation(s).
"""

  [[steps.run]]
  name    = "german"
  role    = "content:translate"
  session = "fresh"
  prompt  = """
Transcreate the following into German (de-DE) as a native German speaker would
write it from scratch, never literal. Detect the content domain (technical,
legal, marketing, academic, casual, ...) and calibrate register and terminology
to it. Preserve meaning, voice, and structure; keep code, placeholders, and URLs
verbatim. If the input contains more than one article or file, translate every
one completely and output each as its own clearly delimited block, same order.

<source>
{{input}}
</source>

Output only the German transcreation(s).
"""

  [[steps.run]]
  name    = "japanese"
  role    = "content:translate"
  session = "fresh"
  prompt  = """
Transcreate the following into Japanese (ja-JP) as a native Japanese speaker
would write it from scratch, never literal. Detect the content domain (technical,
legal, marketing, academic, casual, ...) and calibrate register and terminology
to it. Preserve meaning, voice, and structure; keep code, placeholders, and URLs
verbatim. If the input contains more than one article or file, translate every
one completely and output each as its own clearly delimited block, same order.

<source>
{{input}}
</source>

Output only the Japanese transcreation(s).
"""

# ── 2. Spanish native-fluency loop ───────────────────────────────────────────
[[steps]]
name           = "spanish_native"
loop           = true
max_iterations = 2
exit_when      = { output = "spanish_audit", matches = '(?m)^NATIVE-PASS' }

  [[steps.run]]
  name    = "spanish_fix"
  role    = "content:translate"
  session = "continue"
  prompt  = """
ADJUST this Spanish (es-ES) transcreation so it reads exactly as a native
speaker would write it from scratch. Fix every translationese construct
(source-syntax interference, calques), frequency-outlier words, connector
pileups, and other AI-slop pattern per `content-locale-humanize`, calibrated to
the content's domain. (On later rounds you also receive the native-fluency
auditor's findings from earlier in this conversation — fix every one, criticals
first, without reintroducing anything already resolved.)

<source>
{{input}}
</source>

<draft>
{{spanish}}
</draft>

Output only the revised Spanish text, same shape and article/file boundaries.
"""

  [[steps.run]]
  name    = "spanish_audit"
  role    = "content:translate"
  session = "fresh"
  prompt  = """
NATIVE-AUDIT this Spanish (es-ES) text against the source. Reason as a
skeptical native Spanish-speaking editor of this content's domain — never by
matching an English AI-word list.

<source>
{{input}}
</source>

<translation>
{{spanish_fix}}
</translation>

End with exactly one line: NATIVE-PASS (Pass band, no Critical finding) or
NATIVE-FAIL. Nothing after it.
"""

