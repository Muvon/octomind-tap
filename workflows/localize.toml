# Title: Localize — Any Language, Native-Sounding, Editor Loop Until Clean
#
# Public workflow: transcreate every requested language (parsed from the input
# at runtime — no hardcoded language list), then run a genuine fix <-> audit
# loop, same evaluator-optimizer shape as `develop.toml` / `content.toml`,
# until every language reports PASS or the iteration cap is hit. Finally,
# deliver: write each language's result to disk if the input named or implied
# a file path (git-aware, in-place), otherwise return it inline — plus a
# per-language change summary so you can see what was actually fixed.
#
# Why one turn covers ALL languages, not a branch per language: this engine's
# `loop` step type cannot dynamically fan out per item (confirmed against the
# engine source — `match` is a `parallel`-only feature, and `LoopStep` has no
# such field). A real "loop until every language passes" therefore has to live
# inside ONE set of `fix`/`audit` calls that each handle every requested
# language together (content:translate already natively supports "multiple
# target languages -> N independent blocks" in one turn). Trade-off: languages
# no longer transcreate in true parallel — but a fixed convergence loop that
# actually re-checks its own work is worth more than parallel speed here, and
# it eliminates an entire class of bugs an earlier per-language dynamic-match
# design hit (stray tag matches spawning duplicate branches, regex anchoring
# regressions). Add a language by asking for it in the input, nothing to edit
# here. Add per-language calibration by dropping a new
# `content-locale-humanize-<code>` skill.
#
# Include the source's OWN language in the requested list (e.g. source is
# English, ask for "English, Chinese, and Russian") to also run an AI-slop
# check-and-fix pass on the source itself via content-voice/content-humanize —
# every prompt detects the same-language case per-language and switches rubric.
#
# Note: `max_iterations = 3` is a safety ceiling, not the target — research on
# iterative LLM self-refinement (TEaR, Self-Refine) finds quality peaks early
# and can decline with more automated rounds, so this should usually exit via
# `ALL-PASS` well before the cap. If it's still failing at the cap, that's a
# signal to look at the findings, not to raise the cap.
#
# Note: `retries = 2` on every step. Confirmed necessary the hard way — a
# persistent upstream HTTP 524 (gateway timeout, not a local network issue)
# from the provider hit the same language repeatedly across multiple test
# runs; without retries a single transient failure kills the whole run.
#
# Input shape: state the target language(s) in plain language, then the source
# content — a file path, multiple file paths, or pasted text, one article or
# several. Whatever the input says, that's what happens; the deliver step
# decides file-vs-inline per language from context, never by rigid rule.
# Example:
#   Localize into Chinese and Russian:
#   content/english/blog/my-post/index.md
#
# Public roles only.

name        = "localize"
description = "Transcreate every requested language (parsed at runtime, no hardcoded list), then loop fix <-> audit (like develop.toml) until every language passes native-fluency review or the iteration cap is hit, then deliver — writing to disk in-place if a path was given, git-aware, with a per-language change summary."

# ── 1. Transcreate every requested language in one pass ─────────────────────
[[steps]]
name    = "transcreate"
role    = "content:translate"
session = "fresh"
retries = 2
prompt  = """
Parse every target language requested below, with locale variant (es-ES not
es; infer the most likely variant if only a language name is given). Include
the source's own language too if it's explicitly requested — that one gets a
same-language AI-slop check instead of translation.

For EACH requested language: if it's the source's own language, pass the
content through with only obvious mechanical fixes (typos, broken syntax) —
the loop below owns the real AI-slop pass, don't duplicate that work here.
Otherwise transcreate directly and cleanly into that language, as a native
speaker would write it from scratch — never literal. Detect the content domain
(technical, legal, marketing, academic, casual, ...) and calibrate register
and terminology to it. Preserve meaning, voice, and structure; keep code,
placeholders, and URLs verbatim. If the source is a file path, read it; if
it's pasted text, use it directly; if there are multiple articles/files,
process every one.

Even if the request below mentions a destination file for any language, do
NOT write to it — this is a working draft, not final. Only the pipeline's
last step writes to disk.

<request>
{{input}}
</request>

Output one block per requested language, each starting with its own
`<lang>code</lang>` marker on its own line. No meta-commentary about your own
process, methodology, or tool use.
"""

# ── 2. Fix <-> audit loop — every language together, each round, until clean ─
[[steps]]
name           = "polish"
loop           = true
max_iterations = 3
exit_when      = { output = "audit", matches = '(?m)^ALL-PASS$' }

  [[steps.run]]
  name    = "fix"
  role    = "content:translate"
  session = "continue"
  retries = 2
  prompt  = """
Fix every language block below per its native-fluency findings: the
`content-humanize` 7-pass rewrite for the source's own language, or
`content-locale-humanize` (plus whichever per-language calibration skill
matches) for every other language. Criticals first. (On later rounds you also
have the previous round's audit findings earlier in this conversation —
resolve every one without reintroducing anything already fixed.) A language
with no findings yet, or none reported against it, gets output unchanged —
don't rewrite what isn't broken.

Before shortening or varying ANY repeated word: decide whether it NAMES
something (a product, brand, protocol, command, field, person — a referential
word) or is a STYLE choice (an adjective/verb an AI overuses for emphasis).
Only style choices get varied or cut for repetition. A name must repeat
exactly, verbatim, as many times as the content needs it — never shortened,
abbreviated, or swapped for a synonym, no matter how often it appears.

Even if the request below mentions a destination file for any language, do
NOT write to it — this round isn't final yet (the audit after it may find
more). Only the pipeline's last step writes to disk.

<request>
{{input}}
</request>

<drafts>
{{transcreate}}
</drafts>

Output one block per language, each starting with its own `<lang>code</lang>`
marker. No meta-commentary about your own process.
"""

  [[steps.run]]
  name    = "audit"
  role    = "content:translate"
  session = "fresh"
  retries = 2
  prompt  = """
Audit EVERY language block below independently, each against ONLY its own
section. For the source's own language, run the `content-humanize`
8-dimension diagnostic. For every other language, NATIVE-AUDIT mode via
`content-locale-humanize` (plus whichever per-language calibration skill
matches that language) — never by matching an English AI-word list. Pick
exactly one rubric per language, never both.

<all_fixed_drafts>
{{fix}}
</all_fixed_drafts>

For each language: list findings (severity-ordered, with quotes and fix
direction) if any, then close that language's section with exactly one line —
`<code>: PASS` (native-fluency score in the Pass band, no Critical finding) or
`<code>: FAIL`.

After every language's section, end the WHOLE response with exactly one final
line: `ALL-PASS` if every language reported PASS, otherwise `CONTINUE`.
Nothing after it.
"""

# ── 3. Deliver — write to disk if a path applies, git-aware; else inline ────
[[steps]]
name    = "deliver"
role    = "content:translate"
session = "fresh"
retries = 2
prompt  = """
This is the final, audited, fixed multi-language content, one block per
language:

<final>
{{fix}}
</final>

For each language: if the original request below named or implied a file
path (a source file to overwrite, or an explicit destination) for that
language, write the final text there now — in-place, git-aware (git is the
undo/diff history; check whether the path is inside a git work tree first).
If no path applies to a language, deliver that language's text inline instead
— never invent a path. Preserve each destination file's original structure
(frontmatter, code fences) exactly.

<original_request>
{{input}}
</original_request>

After handling every language, give a brief per-language change summary:
what was fixed (criticals first, in plain terms), what was deliberately left
unchanged, and where the final text landed — the file path written, or
"inline" if no path applied to that language.
"""
