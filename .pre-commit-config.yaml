repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.11.0-1
    hooks:
      - id: shfmt
        args: [-w, -s, -i, "2", -ci]

  - repo: local
    hooks:
      - id: lint-manifests
        name: Lint agent manifests
        language: script
        entry: scripts/lint-manifests.sh
        files: ^agents/.*\.toml$
        pass_filenames: true
