# capabilities/memory-read/octobrain.toml
# Capability: memory-read
# Provider: octobrain — read-only memory subset
# Title: Memory (Read)
# Description: Semantic recall via octobrain — remember returns matching memories plus their 1-hop graph neighbors. Pair with memory-write to also persist memories.

[deps]
require = ["muvon/octobrain"]

[roles.mcp]
server_refs = ["octobrain"]
allowed_tools = ["octobrain:remember"]

[[mcp.servers]]
name = "octobrain"
type = "stdio"
command = "octobrain"
args = ["mcp"]
timeout_seconds = 300
tools = []
