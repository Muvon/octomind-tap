# capabilities/octoweb/octoweb.toml
# Capability: octoweb
# Provider: Octoweb — browser-based personal assistant
# Title: Octoweb
# Description: Browser-based personal assistant via Octoweb HTTP server.

[roles.mcp]
server_refs = ["octoweb"]
allowed_tools = ["octoweb:*"]

[[mcp.servers]]
name = "octoweb"
type = "http"
url = "http://localhost:3434/mcp"
timeout_seconds = 120
tools = []
