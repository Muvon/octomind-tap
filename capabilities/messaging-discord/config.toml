# capabilities/messaging-discord/config.toml
# Capability metadata: trigger phrases for deterministic auto-activation.
#
# Discord-specific vocabulary: servers (guilds), text/voice channels,
# bots, threads, roles, community moderation register.

domains = ["device"]
triggers = [
	"send a message to a discord channel",
	"post to discord",
	"list discord servers",
	"read recent discord messages",
	"DM someone on discord",
	"post in a discord server's text channel",
	"send a message via a discord bot",
	"read messages in a discord thread",
	"ping a role in discord",
	"check what's happening in my discord server",
]
