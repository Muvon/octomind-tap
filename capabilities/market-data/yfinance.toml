# capabilities/market-data/yfinance.toml
# Capability: market-data
# Provider: yfinance — Yahoo Finance data via MCP
# Title: Market Data
# Description: Stock quotes, financial reports, and market data from Yahoo Finance via MCP.

[deps]
require = ["yahoo/yfinance"]

[roles.mcp]
server_refs = ["yfinance"]
allowed_tools = ["yfinance:*"]

[[mcp.servers]]
name = "yfinance"
type = "stdio"
command = "npx"
args = ["-y", "@szemeng76/yfinance-mcp-server"]
timeout_seconds = 60
tools = []
