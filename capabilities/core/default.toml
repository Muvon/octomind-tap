# capabilities/core/default.toml
# Capability: core
# Provider: Octomind built-in core server
# Title: Core Task Planner
# Description: Universal self-management: the plan task tracker, granted to every agent. Delegation (tap) and session control (schedule) live in orchestration.
# Provides tools: plan — structured step-by-step task tracker

[roles.mcp]
server_refs = ["core"]
allowed_tools = ["core:*"]

[[mcp.servers]]
name = "core"
type = "builtin"
timeout_seconds = 30
tools = []
