# capabilities/core/default.toml
# Capability: core
# Provider: Octomind built-in core server
# Title: Core Task Planner
# Description: Built-in core server with structured step-by-step task planning.
# Provides tools: plan — structured step-by-step task tracker

[roles.mcp]
server_refs = ["core"]
allowed_tools = ["core:*"]

[[mcp.servers]]
name = "core"
type = "builtin"
timeout_seconds = 30
tools = []
