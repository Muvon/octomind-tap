# capabilities/knowledge/octobrain.toml
# Capability: knowledge
# Provider: octobrain knowledge tool
# Title: Project Knowledge (octobrain)
# Description: Semantic search over the project's persistent knowledge base — local .box docs, subscribed org boxes, and indexed files, scoped to the active project.

[deps]
require = ["muvon/octobrain"]

[roles.mcp]
server_refs = ["octobrain"]
allowed_tools = ["octobrain:knowledge"]

[[mcp.servers]]
name = "octobrain"
type = "stdio"
command = "octobrain"
args = ["mcp"]
timeout_seconds = 300
tools = []
