# capabilities/medical-reference/medical.toml
# Capability: medical-reference
# Provider: medical-mcp-server — medical references (PubMed, FDA, WHO, RxNorm)
# Title: Medical Reference
# Description: Drug info, clinical data, and guidelines from PubMed, FDA, WHO, and RxNorm via MCP.

[deps]
require = ["medical/medical"]

[roles.mcp]
server_refs = ["medical"]
allowed_tools = ["medical:*"]

[[mcp.servers]]
name = "medical"
type = "stdio"
command = "medical-mcp-server"
args = []
timeout_seconds = 60
tools = []
