# capabilities/versioning/gitlab.toml
# Capability: versioning
# Provider: GitLab — official MCP reference server
# Title: GitLab
# Description: GitLab projects, merge requests, issues, and pipelines via MCP.

[deps]
require = ["gitlab/gitlab"]

[roles.mcp]
server_refs = ["gitlab"]
allowed_tools = ["gitlab:*"]

[[mcp.servers]]
name = "gitlab"
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-gitlab"]
timeout_seconds = 60
env = { GITLAB_PERSONAL_ACCESS_TOKEN = "{{ENV:GITLAB_PERSONAL_ACCESS_TOKEN}}", GITLAB_API_URL = "{{ENV:GITLAB_API_URL}}" }
tools = []
