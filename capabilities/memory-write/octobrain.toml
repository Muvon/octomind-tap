# capabilities/memory-write/octobrain.toml
# Capability: memory-write
# Provider: octobrain — write subset (mutations)
# Title: Memory (Write)
# Description: Create and delete memories via octobrain (memorize — with inline related_to links — and forget). Pair with memory-read.

[deps]
require = ["muvon/octobrain"]

[roles.mcp]
server_refs = ["octobrain"]
allowed_tools = [
  "octobrain:memorize",
  "octobrain:forget",
]

[[mcp.servers]]
name = "octobrain"
type = "stdio"
command = "octobrain"
args = ["mcp"]
timeout_seconds = 300
tools = []
