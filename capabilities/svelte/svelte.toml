# capabilities/svelte/svelte.toml
# Capability: svelte
# Provider: @sveltejs/mcp — official Svelte/SvelteKit documentation
# Title: Svelte
# Description: Official Svelte/SvelteKit documentation via MCP server (runs with bunx).

[deps]
require = ["oven-sh/bun"]

[roles.mcp]
server_refs = ["svelte"]
allowed_tools = ["svelte:*"]

[[mcp.servers]]
name = "svelte"
type = "stdio"
command = "bunx"
args = ["@sveltejs/mcp"]
timeout_seconds = 60
tools = []
