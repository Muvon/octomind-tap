# capabilities/maps/config.toml
# Capability metadata: trigger phrases for deterministic auto-activation.

# Triggers must be unambiguously about real-world location / navigation /
# Google Maps data. Avoid bare "find a place" or "search business" phrasing
# that also fits generic web search and causes false-positive activations.
triggers = [
	"how do I drive from here to there",
	"give me directions on the map",
	"what's the address of these coordinates",
	"how far is it between these two places",
	"restaurants near this location on the map",
	"how long does it take to get there by car",
]
