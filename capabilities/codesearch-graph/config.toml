# capabilities/codesearch-graph/config.toml
triggers = [
	"trace code dependencies",
	"find what calls this function",
	"graph traversal of code",
]

# Code-graph search is for engineering roles. Includes devops (terraform/
# k8s graph traversal) and security (auditing call paths) alongside the
# obvious developer domain. Locks out medical/legal/marketing/etc. so
# generic "find X" prompts in those roles don't pull a code-search false
# positive via the embedding's keyword-leak behaviour.
domains = ["developer", "devops", "security"]
