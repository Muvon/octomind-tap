# templates/agent.toml
# ─────────────────────────────────────────────────────────────────────────────
# Octomind Tap Agent Template
# ─────────────────────────────────────────────────────────────────────────────
#
# Copy this file to agents/<domain>/<spec>.toml and customize.
#
# Quick start:
#   1. Set domain and spec in the filename and header comment
#   2. Write a one-line description
#   3. Set temperature, top_p, top_k for your domain
#   4. Write your system prompt
#   5. Configure MCP servers and tools
#   6. Add dependencies if needed
#
# Run: octomind run <domain>:<spec>
# ─────────────────────────────────────────────────────────────────────────────

# Agent: <domain>:<spec>
# Title: <Short Agent Title (5–60 chars)>
# Description: <One-line description of what this agent does (20–160 chars)>

# ─────────────────────────────────────────────────────────────────────────────
# DEPENDENCIES (Optional)
# ─────────────────────────────────────────────────────────────────────────────
# Tools that auto-install before the session starts.
# Uncomment and customize as needed.

# [deps]
# require = ["nodejs/node", "astral-sh/uv", "rust/cargo"]

# ─────────────────────────────────────────────────────────────────────────────
# ROLE CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────

[[roles]]
# Sampling temperature (0.0–1.0)
# Lower = more deterministic, consistent outputs
# Higher = more creative, varied outputs
# Recommended: 0.1–0.3 for technical domains, 0.4–0.6 for general chat
temperature = 0.3

# Nucleus sampling (0.0–1.0)
# Probability mass to consider. 0.9 = consider tokens comprising top 90% probability
# Recommended: 0.9 for most use cases
top_p = 0.9

# Top-k sampling (0 = disabled)
# Limits to top-k most likely tokens. 0 = disabled (use top_p instead)
# Recommended: 0 for most use cases, 10–40 for more deterministic output
top_k = 0

# Welcome message shown when session starts
# Use {{CWD}} placeholder for current working directory
welcome = "🤖 <Domain> agent ready. I help with <description>. Working in {{CWD}}"

# ─────────────────────────────────────────────────────────────────────────────
# SYSTEM PROMPT (XML-tagged blocks, U-shape order — see tap-agent-authoring)
# ─────────────────────────────────────────────────────────────────────────────
# Order: identity → voice → scope → workflow → rules → examples → output_format → interaction → critical
# - <identity> first (primacy effect)
# - <critical> last with NEVER / ALWAYS lists only (recency effect)
# - Middle blocks rely on tag anchors to survive "lost in the middle"
# - {{CWD}} and {{DATE}} go in the `welcome` field ONLY — never inside `system`.
#   The harness pipes runtime context separately; duplicating it in system causes drift.
# Target: 200–1000 words total. Beyond ~1500 words, context rot hits recall.

system = """
<identity>
<Role + expertise + style — 2–4 sentences. The model reads this first; it sets the persona.>
</identity>

<voice>
<Tone, register, formality. Plain prose or clean bullets. No `### Voice` heading — the tag IS the heading. No `bold` on bullet leads.>
</voice>

<scope>
✅ Own: <bullet list of what this agent handles>
❌ Don't own (route elsewhere): <bullet list with `<other-domain>:<spec>` references>
</scope>

<workflow>
1. <Step name> — <one-sentence description>
2. <Step name> — <description>
3. <Step name> — <description>

<Use `### Subsection` only when this block has 2+ genuinely distinct sub-areas, e.g. `### Research protocol` + `### Memory protocol` alongside the numbered steps. Single-purpose blocks flow as plain prose.>
</workflow>

<rules>
<Domain knowledge as tables, decision matrices, parameter ranges, vocabulary lists.
Tables and code fences stay. `bold` on bullet leads goes — em-dash already separates lead from explanation.>
</rules>

<examples>
<Bad → Good pairs. Skip this block if the agent's output is freeform.>
</examples>

<output_format>
<Exact structure of the artifact. File paths, schemas, save locations.>
</output_format>

<interaction>
- <Trigger pattern> → <response pattern>
- Ambiguous → ask ONE clarifying question, then proceed.
</interaction>

<critical>
NEVER:
- <hard-fail rule>
- <hard-fail rule>

ALWAYS:
- <must-do rule>
- <must-do rule>
</critical>
"""

# ─────────────────────────────────────────────────────────────────────────────
# MCP SERVERS
# ─────────────────────────────────────────────────────────────────────────────
# Built-in servers: core, octofs, octocode, octobrain, agent, tavily

[roles.mcp]
# Server references (built-in servers to enable)
server_refs = ["core", "octofs"]

# Tool allow-list (use wildcards for full access)
# Examples:
#   ["core:*", "octofs:*"]           — Full access to core and octofs
#   ["view", "shell"]                — Restricted to specific tools
#   ["core:*", "semantic_search"]    — Core + specific octocode tool
allowed_tools = ["core:*", "octofs:*"]

# ─────────────────────────────────────────────────────────────────────────────
# CUSTOM MCP SERVERS (Optional)
# ─────────────────────────────────────────────────────────────────────────────
# Add MCP servers beyond the built-in ones.
# Uncomment and customize as needed.

# [[mcp.servers]]
# name = "my-mcp-server"
# type = "stdio"
# command = "npx"
# args = ["-y", "@scope/my-mcp-server"]
# timeout_seconds = 60
# tools = []  # Empty = all tools exposed

# With secrets:
# [[mcp.servers]]
# name = "github"
# type = "stdio"
# command = "npx"
# args = ["-y", "@github/mcp-server"]
# env = { GITHUB_TOKEN = "{{INPUT:GITHUB_TOKEN}}" }
# timeout_seconds = 60
# tools = []

# ─────────────────────────────────────────────────────────────────────────────
# MODEL OVERRIDE (Optional)
# ─────────────────────────────────────────────────────────────────────────────
# Override the global model for this agent.
# Uncomment if you need a specific model.

# model = "openrouter:anthropic/claude-sonnet-4"
