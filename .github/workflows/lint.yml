name: Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint manifests & skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up symlinks for capabilities
        run: bash scripts/setup-symlinks.sh

      - name: Lint all manifests
        run: bash scripts/lint-manifests.sh

      - name: Lint all capabilities
        run: bash scripts/lint-capabilities.sh

      - name: Validate capability resolution
        run: |
          chmod +x bin/load
          bash scripts/validate-capabilities.sh --quiet

      - name: Lint all skills
        run: bash scripts/lint-skills.sh

      - name: Lint all dep scripts
        run: bash scripts/lint-deps.sh

  brief:
    name: PR Brief
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate PR Brief (New PR)
      if: github.event.action == 'opened'
      uses: muvon/octomind-action@master
      with:
        role: developer:brief
        model: ollama:glm-5.1
        prompt: "Compare branch '${{ github.head_ref }}' to '${{ github.base_ref }}' and provide a brief summary of all changes"
        comment: 'full'
      env:
        OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

    - name: Generate PR Brief (Push to existing PR)
      if: github.event.action == 'synchronize'
      uses: muvon/octomind-action@master
      with:
        role: developer:brief
        model: ollama:glm-5.1
        prompt: "Analyze changes from commit ${{ github.event.before }} to ${{ github.event.after }} and provide a brief summary of incremental changes"
        comment: 'full'
      env:
        OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
