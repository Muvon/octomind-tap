name: Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up symlinks for capabilities
        run: bash scripts/setup-symlinks.sh

      - name: Lint all manifests
        run: bash scripts/lint-manifests.sh

      - name: Validate capability resolution
        run: |
          chmod +x bin/load
          bash scripts/validate-capabilities.sh --quiet
