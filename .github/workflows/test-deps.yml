name: Test dep scripts

on:
  push:
    branches: [master, main]
    paths:
      - 'deps/**'
      - '.github/workflows/test-deps.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'deps/**'
      - '.github/workflows/test-deps.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Discover changed dep scripts only ────────────────────────────────────────
  discover:
    name: Discover changed dep scripts
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.find.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed dep scripts
        id: find
        run: |
          # Base ref differs between push and PR
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
          fi

          # Find changed .sh files under deps/ (excluding deps/lib/)
          # If merge base fails, fall back to HEAD~1
          MERGE_BASE=$(git merge-base "origin/$BASE" HEAD 2>/dev/null || git rev-parse HEAD~1)
          CHANGED=$(git diff --name-only --diff-filter=ACMR "$MERGE_BASE" HEAD -- 'deps/*.sh' 'deps/*/*.sh' \
            | grep -v 'deps/lib/' \
            | grep '\.sh$' \
            | sort || true)

          # If the workflow file itself changed, test ALL scripts
          WORKFLOW_CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD -- '.github/workflows/test-deps.yml' || true)
          if [[ -n "$WORKFLOW_CHANGED" ]]; then
            echo "Workflow file changed — testing all scripts"
            CHANGED=$(find deps -name '*.sh' -not -path 'deps/lib/*' | sort)
          fi

          if [[ -z "$CHANGED" ]]; then
            echo "No dep scripts changed"
            echo "scripts=[]" >> "$GITHUB_OUTPUT"
          else
            scripts=$(echo "$CHANGED" | jq -R . | jq -sc .)
            echo "scripts=$scripts" >> "$GITHUB_OUTPUT"
            echo "Changed scripts: $CHANGED"
          fi

  # ── Test on Linux (Docker — genuinely empty Ubuntu 24.04) ────────────────────
  test-linux:
    name: "Linux · ${{ matrix.script }}"
    needs: discover
    if: ${{ needs.discover.outputs.scripts != '[]' && needs.discover.outputs.scripts != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script: ${{ fromJson(needs.discover.outputs.scripts) }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layer
        uses: actions/cache@v4
        with:
          path: /tmp/docker-ubuntu-cache
          key: docker-ubuntu-24.04-base-v1

      - name: Load cached Docker image
        run: |
          if [[ -f /tmp/docker-ubuntu-cache/ubuntu.tar ]]; then
            docker load -i /tmp/docker-ubuntu-cache/ubuntu.tar 2>/dev/null || true
          fi

      - name: Run in clean Ubuntu 24.04 container
        run: |
          docker run --rm \
            --volume "$PWD:/tap:ro" \
            --workdir /tap \
            --env PATH="/root/.local/bin:/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            ubuntu:24.04 \
            bash -c "
              set -euo pipefail
              apt-get update -qq
              apt-get install -y -qq sudo curl wget bash
              echo '=== First run (install) ==='
              bash '${{ matrix.script }}'
              echo '=== Second run (idempotency check) ==='
              bash '${{ matrix.script }}'
              echo 'Idempotency OK'
            "

      - name: Save Docker image to cache
        if: success()
        run: |
          mkdir -p /tmp/docker-ubuntu-cache
          docker save ubuntu:24.04 -o /tmp/docker-ubuntu-cache/ubuntu.tar

  # ── Test on macOS ─────────────────────────────────────────────────────────────
  test-macos:
    name: "macOS · ${{ matrix.script }}"
    needs: discover
    if: ${{ needs.discover.outputs.scripts != '[]' && needs.discover.outputs.scripts != '' }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        script: ${{ fromJson(needs.discover.outputs.scripts) }}

    steps:
      - uses: actions/checkout@v4

      - name: Remove pre-installed tool (force real install path)
        run: |
          set -x
          echo "Script: ${{ matrix.script }}"
          cat "${{ matrix.script }}" | head -20

          # Read the '# check: <cmd>' header from the script to know what to remove.
          cmd=$(grep -m1 '^# check:' "${{ matrix.script }}" | awk '{print $3}')
          if [[ -z "$cmd" ]]; then
            echo "No '# check:' header found — skipping pre-removal."
            exit 0
          fi
          echo "Removing '$cmd' if present..."
          brew uninstall --force "$cmd" 2>/dev/null || true
          rm -f "$HOME/.local/bin/$cmd" "$HOME/.cargo/bin/$cmd" 2>/dev/null || true
          if command -v "$cmd" &>/dev/null; then
            echo "Warning: '$cmd' still in PATH after removal — fast path may fire."
          else
            echo "'$cmd' removed successfully."
          fi

      - name: Run script (install)
        run: |
          set -x
          echo "Working directory: $(pwd)"
          echo "Script: ${{ matrix.script }}"
          ls -la "${{ matrix.script }}" || echo "Script not found!"
          ls -la deps/lib/platform.sh || echo "platform.sh not found!"
          echo "=== Checking environment ==="
          echo "OS: $(uname -s)"
          echo "ARCH: $(uname -m)"
          echo "PATH: $PATH"
          command -v brew && echo "brew found at: $(command -v brew)" || echo "brew NOT found"
          command -v cc && echo "cc found at: $(command -v cc)" || echo "cc NOT found"
          command -v cargo && echo "cargo found at: $(command -v cargo)" || echo "cargo NOT found"
          echo "=== Running script ==="
          bash '${{ matrix.script }}' || {
            echo "Script failed with exit code: $?"
            exit 1
          }
          echo "=== Script completed successfully ==="

      - name: Run script again (idempotency check)
        run: |
          bash '${{ matrix.script }}'
          echo "Idempotency OK"

  # ── Test on Windows ──────────────────────────────────────────────────────────
  test-windows:
    name: "Windows · ${{ matrix.script }}"
    needs: discover
    if: ${{ needs.discover.outputs.scripts != '[]' && needs.discover.outputs.scripts != '' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        script: ${{ fromJson(needs.discover.outputs.scripts) }}

    steps:
      - uses: actions/checkout@v4

      - name: Run script (install)
        shell: bash
        run: |
          echo "=== First run (install) ==="
          bash '${{ matrix.script }}'

      - name: Run script again (idempotency check)
        shell: bash
        run: |
          bash '${{ matrix.script }}'
          echo "Idempotency OK"
